name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Django checks & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ut-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: ut-backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: System check
        env:
          SECRET_KEY: ci-not-a-secret
          DEBUG: "True"
          DJANGO_SETTINGS_MODULE: main_backend.settings
        run: python manage.py check --fail-level WARNING

      - name: Run tests
        env:
          SECRET_KEY: ci-not-a-secret
          DEBUG: "True"
          DJANGO_SETTINGS_MODULE: main_backend.settings
        run: python manage.py test --verbosity=2

  frontend:
    name: Next.js type-check & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ut-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ut-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          BACKEND_URL: http://localhost:8000
          NEXT_PUBLIC_SITE_URL: https://urbantrends.dev
        run: npm run build

  build-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./ut-backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/urbantrends-backend:latest
            ghcr.io/${{ github.repository_owner }}/urbantrends-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./ut-frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/urbantrends-frontend:latest
            ghcr.io/${{ github.repository_owner }}/urbantrends-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=https://urbantrends.dev
            BACKEND_URL=http://backend:8000
          cache-from: type=gha
          cache-to: type=gha,mode=max
