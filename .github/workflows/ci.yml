name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Django checks & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ut-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: ut-backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: System check
        env:
          SECRET_KEY: ci-not-a-secret
          DEBUG: "True"
          DJANGO_SETTINGS_MODULE: main_backend.settings
        run: python manage.py check --fail-level WARNING

      - name: Run tests
        env:
          SECRET_KEY: ci-not-a-secret
          DEBUG: "True"
          DJANGO_SETTINGS_MODULE: main_backend.settings
        run: python manage.py test --verbosity=2

  frontend:
    name: Next.js type-check & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ut-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ut-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build
        env:
          BACKEND_URL: http://localhost:8000
          NEXT_PUBLIC_SITE_URL: https://urbantrends.dev
        run: npm run build
