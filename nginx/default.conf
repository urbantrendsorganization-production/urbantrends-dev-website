# UrbanTrends reverse proxy.
#
# Routing:
#   /api/, /_allauth/, /accounts/, /admin/  -> Django (backend:8000)
#   /static/, /media/                       -> served directly from shared volumes
#   everything else                         -> Next.js (frontend:3000)
#
# SSL is terminated externally (Certbot/Caddy on the host) OR via the commented
# 443 block below. This server block speaks plain HTTP on port 80.

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

# Reusable proxy headers — preserve the real client + original Host so Django's
# CSRF / ALLOWED_HOSTS and request.build_absolute_uri() behave correctly behind
# the proxy.
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;

server {
    listen 80;
    server_name _;

    # Allow large uploads (media, receipts, etc.).
    client_max_body_size 25m;

    # --- Django-collected static assets (admin/jazzmin CSS, etc.) ---
    location /static/ {
        alias /static/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    # --- User-uploaded media ---
    location /media/ {
        alias /media/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    # --- Django application routes ---
    location /api/ {
        proxy_pass http://backend;
    }

    location /_allauth/ {
        proxy_pass http://backend;
    }

    location /accounts/ {
        proxy_pass http://backend;
    }

    location /admin/ {
        proxy_pass http://backend;
    }

    # --- Everything else -> Next.js ---
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# -----------------------------------------------------------------------------
