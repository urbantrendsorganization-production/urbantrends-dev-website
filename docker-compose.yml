# UrbanTrends — self-hosted stack for a single VPS.
#
#   db       Postgres 16 (data persisted in a named volume)
#   backend  Django + gunicorn  → 127.0.0.1:8000 (Caddy proxies to it)
#   frontend Next.js standalone → 127.0.0.1:3000 (Caddy proxies to it)
#
# TLS and the public-facing port (80/443) are handled by Caddy on the host —
# not by a container. The two service ports are bound to loopback only so they
# are never reachable from outside the machine. See Caddyfile.example.
#
# Usage:
#   cp .env.example .env        # fill in real values
#   docker compose up -d --build
#
# Secrets live in .env (gitignored) and ut-backend/.env — never in this file.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-urbantrends}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-urbantrends}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-urbantrends} -d ${POSTGRES_DB:-urbantrends}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE:-urbantrends-backend:local}
    build:
      context: ./ut-backend
    restart: unless-stopped
    # Real secrets come from ut-backend/.env (RESEND_API_KEY, GITHUB_*, etc.).
    # DATABASE_URL is set here so the same .env works with or without Docker.
    env_file:
      - ./ut-backend/.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-urbantrends}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-urbantrends}
    volumes:
      - static:/app/staticfiles
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/admin/login/', timeout=3)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    image: ${FRONTEND_IMAGE:-urbantrends-frontend:local}
    build:
      context: ./ut-frontend
      args:
        # Both are baked into the build output at build time.
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
        BACKEND_URL: http://backend:8000
    restart: unless-stopped
    environment:
      # Same-origin proxying happens at Caddy; next.config.ts rewrites still
      # forward /api, /_allauth, /accounts to the backend service directly.
      BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pgdata:
  static:
  media:
